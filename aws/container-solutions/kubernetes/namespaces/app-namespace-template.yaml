# Template: Application Namespace
# Usage: Copy this file, replace TEAM_NAME and ENVIRONMENT, apply via Terraform or GitOps.
#
# Naming convention: {team-name}-{environment}
# Examples: payments-prod, orders-dev, auth-test

apiVersion: v1
kind: Namespace
metadata:
  name: TEAM_NAME-ENVIRONMENT
  labels:
    # Restrict pod security to Restricted profile in production
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
    team: TEAM_NAME
    environment: ENVIRONMENT
    app.kubernetes.io/managed-by: terraform
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: default-quota
  namespace: TEAM_NAME-ENVIRONMENT
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    pods: "50"
    services: "20"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: TEAM_NAME-ENVIRONMENT
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 8Gi
      min:
        cpu: 10m
        memory: 16Mi
