# Template: ExternalSecret — syncs a secret from AWS Secrets Manager
# into a Kubernetes Secret in the application namespace.
#
# Usage: Copy per application secret. The Kubernetes Secret is auto-created
#        and kept in sync by External Secrets Operator.
#
# AWS Secrets Manager secret naming convention:
#   {project}/{environment}/{team}/{secret-name}
#   Example: eks-platform/prod/payments/database-credentials

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: REPLACE_WITH_SECRET_NAME
  namespace: REPLACE_WITH_NAMESPACE
spec:
  # How often to sync from Secrets Manager (1h recommended)
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    # Name of the Kubernetes Secret to create
    name: REPLACE_WITH_SECRET_NAME
    creationPolicy: Owner
    # Optionally apply a template to transform the secret data
    # template:
    #   engineVersion: v2
    #   data:
    #     connection-string: "{{ .host }}:{{ .port }}/{{ .dbname }}"

  data:
    # Map each key in the Secrets Manager JSON to a Kubernetes Secret key
    - secretKey: username
      remoteRef:
        key: eks-platform/prod/TEAM/REPLACE_WITH_SECRET_NAME
        property: username
    - secretKey: password
      remoteRef:
        key: eks-platform/prod/TEAM/REPLACE_WITH_SECRET_NAME
        property: password
