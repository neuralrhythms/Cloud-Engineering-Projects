# ClusterSecretStore — External Secrets Operator
# Configures the connection to AWS Secrets Manager for the entire cluster.
# All ExternalSecret resources reference this store by name.
#
# Prerequisites:
#   - External Secrets Operator deployed (helm/platform-services/external-secrets)
#   - IAM role with SecretsManager read permissions (IRSA on ESO service account)

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: platform-system
