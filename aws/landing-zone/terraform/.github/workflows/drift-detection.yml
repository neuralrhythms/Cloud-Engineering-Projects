name: Drift Detection

on:
  schedule:
    - cron: '0 6 * * 1-5'  # Weekdays at 6 AM UTC
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

env:
  TF_VERSION: "1.6.0"
  AWS_REGION: "us-east-1"

jobs:
  drift-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        layer:
          - 01-organization
          - 02-security
          - 03-logging
          - 04-networking
          - 05-identity
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: layers/${{ matrix.layer }}
        run: terraform init -input=false

      - name: Check for Drift
        id: drift
        working-directory: layers/${{ matrix.layer }}
        run: |
          terraform plan -input=false -detailed-exitcode -no-color > drift_output.txt 2>&1 || echo "exitcode=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Create Issue on Drift
        if: steps.drift.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const drift = fs.readFileSync('layers/${{ matrix.layer }}/drift_output.txt', 'utf8');
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Drift Detected] Layer: ${{ matrix.layer }}`,
              body: `## Infrastructure Drift Detected\n\n**Layer:** \`${{ matrix.layer }}\`\n**Detected:** ${new Date().toISOString()}\n\n<details>\n<summary>Drift Details</summary>\n\n\`\`\`\n${drift.substring(0, 60000)}\n\`\`\`\n\n</details>`,
              labels: ['drift', 'infrastructure']
            });
